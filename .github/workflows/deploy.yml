name: deploy-mkdocs
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write      
  id-token: write   
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install "mkdocs<2.0.0" mkdocs-material
      
      # Generates unified problem directories dynamically
      - run: python build_docs.py
      
      # Compiles markdown to final production HTML structures
      - run: mkdocs build
      - run: touch site/.nojekyll
      
      # Packages and uploads the static folder to GitHub hosting
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './site'
          
      # Deploys directly to the live environment
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4